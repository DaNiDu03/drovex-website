<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Drovex Logo V7</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem;padding:2rem}
.wrap{background:#111;padding:70px 120px;display:inline-block}
.controls{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
button{padding:.65rem 1.5rem;font-size:12px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;font-family:sans-serif;font-weight:600;border-radius:2px}
.dl{background:#c8a97e;color:#111}
.dl:hover{background:#b8956a}
.note{color:#555;font-size:11px;letter-spacing:.12em;text-transform:uppercase}
</style>
</head>
<body>

<div class="wrap">
<svg id="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260">
  <rect width="700" height="260" fill="#111111"/>

  <!-- DROV white, EX gold, capital, Playfair Display -->
  <text x="350" y="158"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-size="108"
    font-weight="400"
    letter-spacing="18"
    fill="#ffffff">DROV<tspan fill="#c8a97e">EX</tspan></text>

  <!-- Gold line -->
  <line x1="100" y1="180" x2="600" y2="180" stroke="#c8a97e" stroke-width="1.2"/>

  <!-- Tagline -->
  <text x="350" y="218"
    text-anchor="middle"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="12"
    font-weight="300"
    fill="#555"
    letter-spacing="7">PREMIUM MINIMALIST TEES</text>
</svg>
</div>

<div class="controls">
  <button class="dl" onclick="dlSVG()">Download SVG</button>
  <button class="dl" onclick="dlPNG()">Download PNG (1400px)</button>
</div>
<p class="note">Black background · Capital letters · Gold EX accent · Playfair Display</p>

<script>
function dlSVG(){
  const s=document.getElementById('logo-svg');
  const b=new Blob([s.outerHTML],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='drovex-logo-v7.svg';
  a.click();
}
function dlPNG(){
  const s=document.getElementById('logo-svg');
  const data=new XMLSerializer().serializeToString(s);
  const c=document.createElement('canvas');
  c.width=1400;c.height=520;
  const ctx=c.getContext('2d');
  const img=new Image();
  const blob=new Blob([data],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  img.onload=function(){
    ctx.drawImage(img,0,0,1400,520);
    const a=document.createElement('a');
    a.download='drovex-logo-v7.png';
    a.href=c.toDataURL('image/png');
    a.click();
    URL.revokeObjectURL(url);
  };
  img.src=url;
}
</script>
</body>
</html>
